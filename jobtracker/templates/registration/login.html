<!DOCTYPE html>
{% load static %}
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body>

<div class="auth-card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

<label>Username</label>
{{ form.username }}

<label>Password</label>
{{ form.password }}

<button type="submit">Login</button>

</form>

<p>Don't have an account?
<a href="/accounts/signup/">Sign Up</a>
</p>

</div>

</body>

</html>
